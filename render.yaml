# Render Blueprint for Bap staging and production.
#
# Current mapping:
# - Render manages separate staging and production environments in one project.
# - Each environment owns its own web, worker, MCP gateway, Postgres, Key Value,
#   Zero cache, MinIO-backed S3, and observability stack (VictoriaMetrics,
#   VictoriaLogs, VictoriaTraces, Vector, Alertmanager, vmalert, and Grafana).
#
# Notes:
# - Keep secrets out of this blueprint and sync them from Infisical after the
#   resources exist. Use separate Render environment groups named `staging`
#   and `prod` so web, worker, and MCP can share secrets without staging and
#   production sharing credentials. Keep those groups managed outside this
#   blueprint; services reference them with `fromGroup`.
# - Render environment groups do not override service-level variables with the
#   same key, so any secrets provided by Infisical must not also be declared
#   directly on these services in this blueprint.
# - `APP_URL` and `VITE_APP_URL` should come from Infisical and point to
#   the correct Render hostname or custom domain for each environment before
#   testing auth/email flows.
# - The MinIO services are public because presigned URLs must be reachable from
#   the browser. If production traffic grows, prefer a managed object store such
#   as S3 or R2 and set `AWS_ENDPOINT_URL`/credentials from the production
#   environment group instead of running production object storage on Render.
# - Create the environment-specific document buckets once after the first deploy
#   (`cmdclaw-documents` for staging, `cmdclaw-documents-prod` for production).
# - The observability services stay on the private network. Operators reach the
#   Render private `10.0.0.0/8` range through the Tailscale subnet router defined
#   below. Grafana and the Victoria backends are exposed through one
#   Caddy-backed Tailscale ingress per environment. Web and worker export
#   telemetry to Vector via private-network host + port env vars.

previews:
  generation: "off"

projects:
  - name: bap
    environments:
      - name: staging
        databases:
          - name: bap-postgres-staging
            region: frankfurt
            plan: basic-256mb
            postgresMajorVersion: "18"
            ipAllowList: []

        services:
          - type: keyvalue
            name: bap-redis-staging
            region: frankfurt
            plan: starter
            maxmemoryPolicy: noeviction
            ipAllowList: []

          - type: web
            name: bap-s3-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/minio
            dockerfilePath: docker/images/minio/Dockerfile
            healthCheckPath: /minio/health/live
            disk:
              name: bap-s3-data
              mountPath: /data
              sizeGB: 10
            envVars:
              - key: PORT
                value: "10000"
              - fromGroup: staging

          - type: worker
            name: bap-tailscale-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-tailscale-state
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - fromGroup: staging
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: ADVERTISE_ROUTES
                value: 10.0.0.0/8

          - type: worker
            name: bap-postgres-tailscale-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-postgres-tailscale-state
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - fromGroup: staging
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: TAILSCALE_HOSTNAME
                value: bap-postgres-tailscale-staging
              - key: TAILSCALE_TCP_FORWARD_TARGET_HOST
                fromDatabase:
                  name: bap-postgres-staging
                  property: host
              - key: TAILSCALE_TCP_FORWARD_PORTS
                value: "5432:5432"

          - type: pserv
            name: bap-zero-cache-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: rocicorp/zero:1.6.2
            disk:
              name: bap-zero-cache-data
              mountPath: /data
              sizeGB: 10
            envVars:
              - fromGroup: staging
              - key: NODE_ENV
                value: production
              - key: ZERO_PORT
                value: "4848"
              - key: ZERO_APP_ID
                value: zero_staging_20260623
              - key: ZERO_APP_PUBLICATIONS
                value: zero_bap_staging
              - key: ZERO_CVR_DB
                fromDatabase:
                  name: bap-postgres-staging
                  property: connectionString
              - key: ZERO_CHANGE_DB
                fromDatabase:
                  name: bap-postgres-staging
                  property: connectionString
              - key: ZERO_REPLICA_FILE
                value: /data/replica-zero-staging-20260623.db
              - key: ZERO_ADMIN_PASSWORD
                generateValue: true
              - key: ZERO_QUERY_URL
                value: https://staging.heybap.com/api/zero/query
              - key: ZERO_QUERY_FORWARD_COOKIES
                value: "true"
              - key: ZERO_ENABLE_CRUD_MUTATIONS
                value: "false"
              - key: ZERO_LOG_FORMAT
                value: json

          - type: pserv
            name: bap-caddy-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/caddy
            dockerfilePath: docker/images/caddy/Dockerfile
            dockerCommand: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
            disk:
              name: bap-caddy-data
              mountPath: /data
              sizeGB: 1
            envVars:
              - key: PORT
                value: "10000"
              - fromGroup: staging
              - key: APP_GRAFANA_DOMAIN
                value: grafana.ops.staging.heybap.com
              - key: APP_VICTORIA_METRICS_DOMAIN
                value: victoria-metrics.ops.staging.heybap.com
              - key: APP_VICTORIA_LOGS_DOMAIN
                value: victoria-logs.ops.staging.heybap.com
              - key: APP_VICTORIA_TRACES_DOMAIN
                value: victoria-traces.ops.staging.heybap.com
              - key: APP_GRAFANA_HOST
                fromService:
                  type: pserv
                  name: bap-grafana-staging
                  property: host
              - key: APP_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-metrics-staging
                  property: host
              - key: APP_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-logs-staging
                  property: host
              - key: APP_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-traces-staging
                  property: host

          - type: web
            name: bap-app-edge-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/app-edge-caddy
            dockerfilePath: docker/images/app-edge-caddy/Dockerfile
            dockerCommand: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
            healthCheckPath: /health
            envVars:
              - key: PORT
                value: "10000"
              - key: APP_WEB_HOST
                value: cmdclaw-web-staging.onrender.com
              - key: APP_ZERO_CACHE_HOST
                fromService:
                  type: pserv
                  name: bap-zero-cache-staging
                  property: host

          - type: worker
            name: bap-caddy-tailscale-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-caddy-tailscale-state
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - fromGroup: staging
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: TAILSCALE_HOSTNAME
                value: bap-caddy-tailscale-staging
              - key: TAILSCALE_TCP_FORWARD_TARGET_HOST
                fromService:
                  type: pserv
                  name: bap-caddy-staging
                  property: host
              - key: TAILSCALE_TCP_FORWARD_PORTS
                value: "80:80,443:443"

          - type: pserv
            name: bap-victoria-metrics-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: docker.io/victoriametrics/victoria-metrics:v1.140.0
            dockerCommand: /victoria-metrics-prod -storageDataPath=/victoria-metrics-data -vmalert.proxyURL=http://cmdclaw-vmalert-staging:8880
            disk:
              name: bap-victoria-metrics-data
              mountPath: /victoria-metrics-data
              sizeGB: 10

          - type: pserv
            name: bap-victoria-logs-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-logs:v1.48.0
            dockerCommand: /victoria-logs-prod -storageDataPath=/victoria-logs-data
            disk:
              name: bap-victoria-logs-data
              mountPath: /victoria-logs-data
              sizeGB: 2

          - type: pserv
            name: bap-victoria-traces-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-traces:v0.8.0
            dockerCommand: /victoria-traces-prod -storageDataPath=/victoria-traces-data
            disk:
              name: bap-victoria-traces-data
              mountPath: /victoria-traces-data
              sizeGB: 2

          - type: pserv
            name: bap-vector-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/vector
            dockerfilePath: docker/images/vector/Dockerfile
            envVars:
              - key: APP_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-metrics-staging
                  property: host
              - key: APP_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-logs-staging
                  property: host
              - key: APP_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-traces-staging
                  property: host

          - type: pserv
            name: bap-alertmanager-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/alertmanager
            dockerfilePath: docker/images/alertmanager/Dockerfile
            disk:
              name: bap-alertmanager-data
              mountPath: /alertmanager
              sizeGB: 1
            envVars:
              - key: APP_ALERT_ENV
                value: staging

          - type: pserv
            name: bap-vmalert-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/vmalert
            dockerfilePath: docker/images/vmalert/Dockerfile
            envVars:
              - key: APP_ALERT_ENV
                value: staging
              - key: APP_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-metrics-staging
                  property: host
              - key: APP_ALERTMANAGER_HOST
                fromService:
                  type: pserv
                  name: bap-alertmanager-staging
                  property: host

          - type: pserv
            name: bap-grafana-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/grafana
            dockerfilePath: docker/images/grafana/Dockerfile
            disk:
              name: bap-grafana-data
              mountPath: /var/lib/grafana
              sizeGB: 2
            envVars:
              - key: GF_AUTH_ANONYMOUS_ENABLED
                value: "false"
              - key: GF_AUTH_DISABLE_LOGIN_FORM
                value: "false"
              - key: GF_SERVER_ROOT_URL
                value: https://grafana.ops.staging.heybap.com
              - key: GF_PLUGINS_PREINSTALL_SYNC
                value: victoriametrics-logs-datasource
              - key: APP_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-metrics-staging
                  property: host
              - key: APP_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-logs-staging
                  property: host
              - key: APP_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-traces-staging
                  property: host
              - key: APP_ALERTMANAGER_HOST
                fromService:
                  type: pserv
                  name: bap-alertmanager-staging
                  property: host

          - type: web
            name: bap-web-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: .
            dockerfilePath: docker/images/web/Dockerfile
            dockerCommand: node .output/server/index.mjs
            healthCheckPath: /api/live
            envVars:
              - key: PORT
                value: "10000"
              - key: HOST
                value: 0.0.0.0
              - fromGroup: staging
              - key: DATABASE_URL
                fromDatabase:
                  name: bap-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: bap-redis-staging
                  property: connectionString
              - key: AWS_ENDPOINT_URL
                fromService:
                  type: web
                  name: bap-s3-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: AWS_INTERNAL_ENDPOINT_URL
                value: http://cmdclaw-s3-staging:10000
              - key: AWS_DEFAULT_REGION
                value: us-east-1
              - key: AWS_S3_FORCE_PATH_STYLE
                value: "true"
              - key: APP_VECTOR_HOST
                fromService:
                  type: pserv
                  name: bap-vector-staging
                  property: host
              - key: APP_VECTOR_LOG_PORT
                value: "8686"
              - key: APP_VECTOR_OTLP_HTTP_PORT
                value: "4318"
              - key: APP_VECTOR_TRACES_PORT
                value: "5318"
              - key: APP_MCP_BASE_URL
                fromService:
                  type: web
                  name: bap-mcp-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: SANDBOX_AGENT_RUNTIME
                value: opencode
              - key: SANDBOX_DEFAULT
                value: daytona
              - key: E2B_DAYTONA_SANDBOX_NAME
                value: bap-agent-staging

          - type: web
            name: bap-mcp-staging
            runtime: docker
            region: frankfurt
            plan: standard
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: .
            dockerfilePath: docker/images/mcp/Dockerfile
            healthCheckPath: /
            envVars:
              - key: PORT
                value: "10000"
              - fromGroup: staging
              - key: AWS_ENDPOINT_URL
                fromService:
                  type: web
                  name: bap-s3-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: AWS_INTERNAL_ENDPOINT_URL
                value: http://cmdclaw-s3-staging:10000
              - key: AWS_DEFAULT_REGION
                value: us-east-1
              - key: AWS_S3_FORCE_PATH_STYLE
                value: "true"
              - key: MCP_GATEWAY_MANAGED_CHILDREN
                value: "true"
              - key: MCP_GATEWAY_CHILD_MODE
                value: start

          - type: worker
            name: bap-worker-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: .
            dockerfilePath: docker/images/worker/Dockerfile
            dockerCommand: bun dist/index.js
            envVars:
              - fromGroup: staging
              - key: DATABASE_URL
                fromDatabase:
                  name: bap-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: bap-redis-staging
                  property: connectionString
              - key: AWS_ENDPOINT_URL
                fromService:
                  type: web
                  name: bap-s3-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: AWS_INTERNAL_ENDPOINT_URL
                value: http://cmdclaw-s3-staging:10000
              - key: AWS_DEFAULT_REGION
                value: us-east-1
              - key: AWS_S3_FORCE_PATH_STYLE
                value: "true"
              - key: APP_VECTOR_HOST
                fromService:
                  type: pserv
                  name: bap-vector-staging
                  property: host
              - key: APP_VECTOR_LOG_PORT
                value: "8686"
              - key: APP_VECTOR_OTLP_HTTP_PORT
                value: "4318"
              - key: APP_VECTOR_TRACES_PORT
                value: "5318"
              - key: APP_MCP_BASE_URL
                fromService:
                  type: web
                  name: bap-mcp-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: SANDBOX_AGENT_RUNTIME
                value: opencode
              - key: SANDBOX_DEFAULT
                value: daytona
              - key: E2B_DAYTONA_SANDBOX_NAME
                value: bap-agent-staging

      - name: production
        databases:
          - name: bap-postgres-prod
            region: frankfurt
            plan: basic-1gb
            postgresMajorVersion: "18"
            ipAllowList: []

        services:
          - type: keyvalue
            name: bap-redis-prod
            region: frankfurt
            plan: starter
            maxmemoryPolicy: noeviction
            ipAllowList: []

          - type: web
            name: bap-s3-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/minio
            dockerfilePath: docker/images/minio/Dockerfile
            healthCheckPath: /minio/health/live
            disk:
              name: bap-s3-data-prod
              mountPath: /data
              sizeGB: 25
            envVars:
              - key: PORT
                value: "10000"
              - fromGroup: prod

          - type: worker
            name: bap-tailscale-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-tailscale-state-prod
              mountPath: /var/lib/tailscale
              sizeGB: 2
            envVars:
              - fromGroup: prod
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: ADVERTISE_ROUTES
                value: 10.0.0.0/8

          - type: worker
            name: bap-postgres-tailscale-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-postgres-tailscale-state-prod
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - fromGroup: prod
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: TAILSCALE_HOSTNAME
                value: bap-postgres-tailscale-prod
              - key: TAILSCALE_TCP_FORWARD_TARGET_HOST
                fromDatabase:
                  name: bap-postgres-prod
                  property: host
              - key: TAILSCALE_TCP_FORWARD_PORTS
                value: "5432:5432"

          - type: pserv
            name: bap-zero-cache-prod
            runtime: image
            region: frankfurt
            plan: standard
            numInstances: 1
            image:
              url: rocicorp/zero:1.6.2
            disk:
              name: bap-zero-cache-data-prod
              mountPath: /data
              sizeGB: 10
            envVars:
              - fromGroup: prod
              - key: NODE_ENV
                value: production
              - key: ZERO_PORT
                value: "4848"
              - key: ZERO_APP_PUBLICATIONS
                value: zero_bap_prod
              - key: ZERO_CVR_DB
                fromDatabase:
                  name: bap-postgres-prod
                  property: connectionString
              - key: ZERO_CHANGE_DB
                fromDatabase:
                  name: bap-postgres-prod
                  property: connectionString
              - key: ZERO_REPLICA_FILE
                value: /data/replica.db
              - key: ZERO_ADMIN_PASSWORD
                generateValue: true
              - key: ZERO_QUERY_URL
                value: https://heybap.com/api/zero/query
              - key: ZERO_QUERY_FORWARD_COOKIES
                value: "true"
              - key: ZERO_ENABLE_CRUD_MUTATIONS
                value: "false"
              - key: ZERO_LOG_FORMAT
                value: json

          - type: pserv
            name: bap-caddy-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/caddy
            dockerfilePath: docker/images/caddy/Dockerfile
            dockerCommand: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
            disk:
              name: bap-caddy-data-prod
              mountPath: /data
              sizeGB: 2
            envVars:
              - key: PORT
                value: "10000"
              - fromGroup: prod
              - key: APP_GRAFANA_DOMAIN
                value: grafana.ops.prod.heybap.com
              - key: APP_VICTORIA_METRICS_DOMAIN
                value: victoria-metrics.ops.prod.heybap.com
              - key: APP_VICTORIA_LOGS_DOMAIN
                value: victoria-logs.ops.prod.heybap.com
              - key: APP_VICTORIA_TRACES_DOMAIN
                value: victoria-traces.ops.prod.heybap.com
              - key: APP_GRAFANA_HOST
                fromService:
                  type: pserv
                  name: bap-grafana-prod
                  property: host
              - key: APP_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-metrics-prod
                  property: host
              - key: APP_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-logs-prod
                  property: host
              - key: APP_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: bap-victoria-traces-prod
                  property: host

          - type: web
            name: bap-app-edge-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/app-edge-caddy
            dockerfilePath: docker/images/app-edge-caddy/Dockerfile
            dockerCommand: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
            healthCheckPath: /health
            envVars:
              - key: PORT
                value: "10000"
              - key: APP_WEB_HOST
                value: cmdclaw-web-prod.onrender.com
              - key: APP_ZERO_CACHE_HOST
                fromService:
                  type: pserv
                  name: bap-zero-cache-prod
                  property: host

          - type: worker
            name: bap-caddy-tailscale-prod
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: "off"
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: bap-caddy-tailscale-state-prod
              mountPath: /var/lib/tailscale
              sizeGB: 2
            envVars:
              - fromGroup: prod
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: TAILSCALE_HOSTNAME
                value: bap-caddy-tailscale-prod
              - key: TAILSCALE_TCP_FORWARD_TARGET_HOST
                fromService:
                  type: pserv
                  name: bap-caddy-prod
                  property: host
              - key: TAILSCALE_TCP_FORWARD_PORTS
                value: "80:80,443:443"

          - type: pserv
            name: bap-victoria-metrics-prod
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: docker.io/victoriametrics/victoria-metrics:v1.140.0
            dockerCommand: /victoria-metrics-prod -storageDataPath=/victoria-metrics-data -vmalert.proxyURL=http://cmdclaw-vmalert-prod:8880
            disk:
              name: bap-victoria-metrics-data-prod
              mountPath: /victoria-metrics-data
              sizeGB: 10

          - type: pserv
            name: bap-victoria-logs-prod
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-logs:v1.48.0
