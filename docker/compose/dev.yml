name: ${BAP_COMPOSE_PROJECT:-bap-local}

services:
  localcan-caddy:
    image: caddy:2-alpine
    ports:
      - "${BAP_LOCALCAN_CADDY_PORT:-3399}:80"
    environment:
      LOCALCAN_CADDY_LISTEN_PORT: "80"
      LOCALCAN_APP_ROUTER_UPSTREAM: host.docker.internal:${LOCAL_TUNNEL_PROXY_PORT:-3410}
      LOCALCAN_MCP_UPSTREAM: host.docker.internal:${MCP_GATEWAY_PORT:-3010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../Caddyfile.localcan:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  database:
    image: pgvector/pgvector:pg16
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-${DB_PASSWORD:-}}
      POSTGRES_DB: ${BAP_POSTGRES_DB:-bap}
    ports:
      - "${BAP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - bap_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zero-cache:
    image: rocicorp/zero:1.6.2
    ports:
      - "${BAP_ZERO_CACHE_PORT:-4848}:4848"
    stop_grace_period: 10m
    environment:
      ZERO_UPSTREAM_DB: postgresql://postgres:${DATABASE_PASSWORD:-${DB_PASSWORD:-}}@database:5432/${BAP_POSTGRES_DB:-bap}
      ZERO_CVR_DB: postgresql://postgres:${DATABASE_PASSWORD:-${DB_PASSWORD:-}}@database:5432/${BAP_POSTGRES_DB:-bap}
      ZERO_CHANGE_DB: postgresql://postgres:${DATABASE_PASSWORD:-${DB_PASSWORD:-}}@database:5432/${BAP_POSTGRES_DB:-bap}
      ZERO_REPLICA_FILE: /data/replica.db
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:-bap-local-zero}
      ZERO_QUERY_URL: ${VITE_ZERO_QUERY_URL:-http://host.docker.internal:3000/api/zero/query}
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_ENABLE_CRUD_MUTATIONS: "false"
    volumes:
      - bap_zero_cache_data:/data
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4848/keepalive"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10m

  redis:
    image: redis:8-alpine
    ports:
      - "${BAP_REDIS_PORT:-6379}:6379"
    volumes:
      - bap_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-${S3_ACCESS_KEY_ID:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-${S3_SECRET_ACCESS_KEY:-minioadmin}}
    ports:
      - "${BAP_MINIO_API_PORT:-9000}:9000"
      - "${BAP_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - bap_minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.140.0
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--vmalert.proxyURL=http://vmalert:8880"
    ports:
      - "${BAP_VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - bap_victoria_metrics_data:/victoria-metrics-data
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.48.0
    command:
      - "--storageDataPath=/victoria-logs-data"
    ports:
      - "${BAP_VICTORIA_LOGS_PORT:-9428}:9428"
    volumes:
      - bap_victoria_logs_data:/victoria-logs-data
    restart: unless-stopped

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.8.0
    command:
      - "--storageDataPath=/victoria-traces-data"
    ports:
      - "${BAP_VICTORIA_TRACES_PORT:-10428}:10428"
    volumes:
      - bap_victoria_traces_data:/victoria-traces-data
    restart: unless-stopped

  vector:
    image: timberio/vector:0.54.0-alpine
    command:
      - "--config"
      - "/etc/vector/vector.yaml"
    ports:
      - "${BAP_VECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${BAP_VECTOR_OTLP_HTTP_PORT:-4318}:4318"
      - "${BAP_VECTOR_TRACES_PORT:-5318}:5318"
      - "${BAP_VECTOR_LOG_PORT:-8686}:8686"
    volumes:
      - ./observability/vector.yaml:/etc/vector/vector.yaml:ro
    depends_on:
      - victoria-metrics
      - victoria-logs
      - victoria-traces
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.32.0
    entrypoint:
      - /bin/sh
      - -c
      - |
          mkdir -p /etc/alertmanager/secrets
          if [ -n "$${SLACK_BOT_TOKEN:-}" ]; then
            printf '%s' "$${SLACK_BOT_TOKEN}" > /etc/alertmanager/secrets/slack_bot_token
          else
            : > /etc/alertmanager/secrets/slack_bot_token
          fi
          exec /bin/alertmanager \
            --config.file=/etc/alertmanager/alertmanager.yml \
            --storage.path=/alertmanager \
            --web.listen-address=:9093
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
    ports:
      - "${BAP_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - bap_alertmanager_data:/alertmanager
    restart: unless-stopped

  vmalert:
    image: victoriametrics/vmalert:v1.140.0
    command:
      - "-rule=/etc/vmalert/rules/*.yml"
      - "-rule=/pyrra-rules/*.yaml"
      - "-datasource.url=http://victoria-metrics:8428"
      - "-remoteWrite.url=http://victoria-metrics:8428"
      - "-remoteRead.url=http://victoria-metrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-evaluationInterval=30s"
      - "-rule.evalDelay=30s"
      - "-httpListenAddr=:8880"
    ports:
      - "${BAP_VMALERT_PORT:-8880}:8880"
    volumes:
      - ./observability/vmalert:/etc/vmalert:ro
      - bap_pyrra_slo_rules:/pyrra-rules:ro
    depends_on:
      pyrra-slo-rules:
        condition: service_completed_successfully
      victoria-metrics:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped

  pyrra-slo-rules:
    image: ghcr.io/pyrra-dev/pyrra:v0.9.5
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        rm -f /etc/prometheus/pyrra/*.yaml
        exec pyrra generate \
          --config-files="/etc/pyrra/slos/*.yaml" \
          --prometheus-folder=/etc/prometheus/pyrra \
          --generic-rules
    volumes:
      - ../images/vmalert/pyrra/slos:/etc/pyrra/slos:ro
      - bap_pyrra_slo_rules:/etc/prometheus/pyrra
    restart: "no"
    depends_on:
      - victoria-metrics

  grafana:
    image: grafana/grafana:12.1.7
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_PLUGINS_PREINSTALL_SYNC: victoriametrics-logs-datasource
    ports:
      - "${BAP_GRAFANA_PORT:-3400}:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - bap_grafana_data:/var/lib/grafana
    depends_on:
      - victoria-metrics
      - victoria-logs
      - victoria-traces
      - vmalert
      - alertmanager
    restart: unless-stopped

  daytona-api:
    profiles: ["daytona"]
    image: daytonaio/daytona-api
    ports:
      - "${DAYTONA_API_PORT:-3300}:3000"
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://daytona-otel-collector:4318
      DEFAULT_SNAPSHOT: daytonaio/sandbox:0.5.0-slim
      ENCRYPTION_KEY: supersecretkey
      ENCRYPTION_SALT: supersecretsalt
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: daytona-db
      DB_PORT: "5432"
      DB_USERNAME: user
      DB_PASSWORD: pass
      DB_DATABASE: daytona
      REDIS_HOST: daytona-redis
      REDIS_PORT: "6379"
      OIDC_CLIENT_ID: daytona
      OIDC_ISSUER_BASE_URL: http://daytona-dex:5556/dex
      PUBLIC_OIDC_DOMAIN: http://localhost:${DAYTONA_DEX_PORT:-5556}/dex
      OIDC_AUDIENCE: daytona
      OIDC_MANAGEMENT_API_ENABLED: ""
      OIDC_MANAGEMENT_API_CLIENT_ID: ""
      OIDC_MANAGEMENT_API_CLIENT_SECRET: ""
      OIDC_MANAGEMENT_API_AUDIENCE: ""
      DASHBOARD_URL: http://localhost:${DAYTONA_API_PORT:-3300}/dashboard
      DASHBOARD_BASE_API_URL: http://localhost:${DAYTONA_API_PORT:-3300}
      POSTHOG_API_KEY: phc_bYtEsdMDrNLydXPD4tufkBrHKgfO2zbycM30LOowYNv
      POSTHOG_HOST: https://d18ag4dodbta3l.cloudfront.net
      POSTHOG_ENVIRONMENT: local
      TRANSIENT_REGISTRY_URL: http://registry:6000
      TRANSIENT_REGISTRY_ADMIN: admin
      TRANSIENT_REGISTRY_PASSWORD: password
      TRANSIENT_REGISTRY_PROJECT_ID: daytona
      INTERNAL_REGISTRY_URL: http://registry:6000
      INTERNAL_REGISTRY_ADMIN: admin
      INTERNAL_REGISTRY_PASSWORD: password
      INTERNAL_REGISTRY_PROJECT_ID: daytona
      SMTP_HOST: daytona-maildev
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_SECURE: ""
      SMTP_EMAIL_FROM: Daytona Team <no-reply@daytona.io>
      S3_ENDPOINT: http://minio:9000
      S3_STS_ENDPOINT: http://minio:9000/minio/v1/assume-role
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_DEFAULT_BUCKET: daytona
      S3_ACCOUNT_ID: /
      S3_ROLE_NAME: /
      ENVIRONMENT: docker-compose
      MAX_AUTO_ARCHIVE_INTERVAL: "43200"
      MAINTENANCE_MODE: "false"
      PROXY_DOMAIN: proxy.localhost:${DAYTONA_PROXY_PORT:-4000}
      PROXY_PROTOCOL: http
      PROXY_API_KEY: super_secret_key
      PROXY_TEMPLATE_URL: http://{{PORT}}-{{sandboxId}}.proxy.localhost:${DAYTONA_PROXY_PORT:-4000}
      DEFAULT_RUNNER_DOMAIN: daytona-runner:3003
      DEFAULT_RUNNER_API_URL: http://daytona-runner:3003
      DEFAULT_RUNNER_PROXY_URL: http://daytona-runner:3003
      DEFAULT_RUNNER_API_KEY: secret_api_token
      DEFAULT_RUNNER_CPU: "4"
      DEFAULT_RUNNER_MEMORY: "8"
      DEFAULT_RUNNER_DISK: "50"
      DEFAULT_RUNNER_NAME: default
      DEFAULT_REGION_ID: eu
      DEFAULT_REGION_NAME: eu
      DEFAULT_REGION_ENFORCE_QUOTAS: "false"
      DEFAULT_ORG_QUOTA_TOTAL_CPU_QUOTA: "10000"
      DEFAULT_ORG_QUOTA_TOTAL_MEMORY_QUOTA: "10000"
      DEFAULT_ORG_QUOTA_TOTAL_DISK_QUOTA: "100000"
      DEFAULT_ORG_QUOTA_MAX_CPU_PER_SANDBOX: "100"
      DEFAULT_ORG_QUOTA_MAX_MEMORY_PER_SANDBOX: "100"
      DEFAULT_ORG_QUOTA_MAX_DISK_PER_SANDBOX: "1000"
      DEFAULT_ORG_QUOTA_SNAPSHOT_QUOTA: "1000"
      DEFAULT_ORG_QUOTA_MAX_SNAPSHOT_SIZE: "1000"
      DEFAULT_ORG_QUOTA_VOLUME_QUOTA: "10000"
      SSH_GATEWAY_API_KEY: ssh_secret_api_token
      SSH_GATEWAY_COMMAND: ssh -p ${DAYTONA_SSH_GATEWAY_PORT:-2222} {{TOKEN}}@localhost
      SSH_GATEWAY_PUBLIC_KEY: 
      SSH_GATEWAY_URL: localhost:${DAYTONA_SSH_GATEWAY_PORT:-2222}
      RUNNER_DECLARATIVE_BUILD_SCORE_THRESHOLD: "10"
      RUNNER_AVAILABILITY_SCORE_THRESHOLD: "1"
      RUNNER_START_SCORE_THRESHOLD: "3"
      SKIP_USER_EMAIL_VERIFICATION: "true"
      RUN_MIGRATIONS: "true"
      OTEL_COLLECTOR_API_KEY: otel_collector_api_key
      HEALTH_CHECK_API_KEY: supersecretkey
    restart: always
    privileged: true
    depends_on:
      - daytona-db
      - daytona-runner
      - daytona-redis
      - daytona-dex
      - daytona-registry
      - daytona-otel-collector

  daytona-proxy:
    profiles: ["daytona"]
    image: daytonaio/daytona-proxy
    environment:
      DAYTONA_API_URL: http://daytona-api:3000/api
      PROXY_PORT: "4000"
      PROXY_API_KEY: super_secret_key
      PROXY_PROTOCOL: http
      OIDC_CLIENT_ID: daytona
      OIDC_CLIENT_SECRET: ""
      OIDC_DOMAIN: http://daytona-dex:5556/dex
      OIDC_PUBLIC_DOMAIN: http://localhost:${DAYTONA_DEX_PORT:-5556}/dex
      OIDC_AUDIENCE: daytona
      REDIS_HOST: daytona-redis
      REDIS_PORT: "6379"
      TOOLBOX_ONLY_MODE: "false"
      PREVIEW_WARNING_ENABLED: "false"
    ports:
      - "${DAYTONA_PROXY_PORT:-4000}:4000"
    restart: always

  daytona-runner:
    profiles: ["daytona"]
    image: daytonaio/daytona-runner
    environment:
      ENVIRONMENT: development
      API_PORT: "3003"
      DAYTONA_RUNNER_TOKEN: secret_api_token
      LOG_FILE_PATH: /home/daytona/runner/runner.log
      RESOURCE_LIMITS_DISABLED: "true"
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_BUCKET: daytona
      DAYTONA_API_URL: http://daytona-api:3000/api
      RUNNER_DOMAIN: daytona-runner
      SSH_GATEWAY_ENABLE: "true"
      SSH_PUBLIC_KEY: 
      INTER_SANDBOX_NETWORK_ENABLED: "false"
    privileged: true
    restart: always

  daytona-ssh-gateway:
    profiles: ["daytona"]
    image: daytonaio/daytona-ssh-gateway
    environment:
      API_URL: http://daytona-api:3000/api
      API_KEY: ssh_secret_api_token
      SSH_PRIVATE_KEY: 
      SSH_HOST_KEY: 
      SSH_GATEWAY_PORT: "2222"
    ports:
      - "${DAYTONA_SSH_GATEWAY_PORT:-2222}:2222"
    restart: always

  daytona-dex:
    profiles: ["daytona"]
    image: dexidp/dex:v2.42.0
    environment:
      DAYTONA_DEX_PASSWORD_HASH: ${DAYTONA_DEX_PASSWORD_HASH:-}
    volumes:
      - ./daytona/dex/config.yaml:/etc/dex/config.yaml
      - daytona_dex_data:/var/dex
    entrypoint:
      [
        "sh",
        "-c",
        ": \"$${DAYTONA_DEX_PASSWORD_HASH:?Set DAYTONA_DEX_PASSWORD_HASH to a bcrypt hash for the local Daytona Dex user}\" && sed \"s|__DAYTONA_DEX_PASSWORD_HASH__|$${DAYTONA_DEX_PASSWORD_HASH}|g\" /etc/dex/config.yaml > /tmp/dex-config.yaml && touch /var/dex/dex.db && exec dex serve /tmp/dex-config.yaml",
      ]
    ports:
      - "${DAYTONA_DEX_PORT:-5556}:5556"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5556/dex/.well-known/openid-configuration"]

  daytona-db:
    profiles: ["daytona"]
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_USER: user
      POSTGRES_DB: daytona
    volumes:
      - daytona_db_data:/var/lib/postgresql/18/docker

  daytona-pgadmin:
    profiles: ["daytona"]
    image: dpage/pgadmin4:9.2.0
    entrypoint: ["sh", "-c", "chmod 600 /pgpass && exec /entrypoint.sh"]
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@daytona.io
      PGADMIN_DEFAULT_PASSWORD: pgadmin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    user: root
    volumes:
      - ./daytona/pgadmin4/servers.json:/pgadmin4/servers.json
      - ./daytona/pgadmin4/pgpass:/pgpass
    depends_on:
      - daytona-db

  daytona-redis:
    profiles: ["daytona"]
    image: redis:latest

  daytona-registry-ui:
    profiles: ["daytona"]
    image: joxit/docker-registry-ui:main
    restart: always
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: Docker Registry UI
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
      NGINX_PROXY_PASS_URL: http://registry:6000
      SHOW_CATALOG_NB_TAGS: "true"
      CATALOG_MIN_BRANCHES: "1"
      CATALOG_MAX_BRANCHES: "1"
      TAGLIST_PAGE_SIZE: "100"
      REGISTRY_SECURED: "false"
      CATALOG_ELEMENTS_LIMIT: "1000"

  daytona-registry:
    profiles: ["daytona"]
    image: registry:2.8.2
    restart: always
    environment:
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "[http://registry-ui.example.com]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: "[HEAD,GET,OPTIONS,DELETE]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials: "[true]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: "[Authorization,Accept,Cache-Control]"
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: "[Docker-Content-Digest]"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: 0.0.0.0:6000
    networks:
      default:
        aliases:
          - registry
    volumes:
      - daytona_registry_data:/var/lib/registry

  daytona-maildev:
    profiles: ["daytona"]
    image: maildev/maildev

  daytona-otel-collector:
    profiles: ["daytona"]
    image: otel/opentelemetry-collector-contrib:0.138.0
    volumes:
      - ./daytona/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - vector

volumes:
  bap_postgres_data:
    name: ${BAP_POSTGRES_VOLUME:-bap-local_bap_postgres_data}
  bap_redis_data:
    name: ${BAP_REDIS_VOLUME:-bap-local_bap_redis_data}
  bap_minio_data:
    name: ${BAP_MINIO_VOLUME:-bap-local_bap_minio_data}
  bap_zero_cache_data:
    name: ${BAP_ZERO_CACHE_VOLUME:-bap-local_bap_zero_cache_data}
  bap_victoria_metrics_data:
    name: ${BAP_VICTORIA_METRICS_VOLUME:-bap-local_bap_victoria_metrics_data}
  bap_victoria_logs_data:
    name: ${BAP_VICTORIA_LOGS_VOLUME:-bap-local_bap_victoria_logs_data}
  bap_victoria_traces_data:
    name: ${BAP_VICTORIA_TRACES_VOLUME:-bap-local_bap_victoria_traces_data}
  bap_alertmanager_data:
    name: ${BAP_ALERTMANAGER_VOLUME:-bap-local_bap_alertmanager_data}
  bap_grafana_data:
    name: ${BAP_GRAFANA_VOLUME:-bap-local_bap_grafana_data}
  bap_pyrra_slo_rules:
    name: ${BAP_PYRRA_SLO_RULES_VOLUME:-bap-local_bap_pyrra_slo_rules}
  daytona_db_data:
    name: ${DAYTONA_DB_VOLUME:-daytona_db_data}
  daytona_dex_data:
    name: ${DAYTONA_DEX_VOLUME:-daytona_dex_db}
  daytona_registry_data:
    name: ${DAYTONA_REGISTRY_VOLUME:-daytona_registry}
