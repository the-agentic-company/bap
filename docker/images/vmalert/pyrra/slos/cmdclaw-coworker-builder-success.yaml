apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: app-coworker-builder-success
  namespace: app
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: app
    pyrra.dev/journey: coworker_builder
spec:
  target: "95"
  window: 30d
  description: Coworker builder conversation generation success rate.
  indicator:
    ratio:
      errors:
        metric: app_slo_events_total{journey="coworker_builder",result="bad"}
      total:
        metric: app_slo_events_total{journey="coworker_builder"}
  alerting:
    disabled: true
    absent: false
