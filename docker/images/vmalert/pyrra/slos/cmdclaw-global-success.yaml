apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: app-global-success
  namespace: app
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: app
    pyrra.dev/journey: global
spec:
  target: "95"
  window: 30d
  description: Global App generation and coworker run success rate.
  indicator:
    ratio:
      errors:
        metric: app_slo_events_total{journey="global",result="bad"}
      total:
        metric: app_slo_events_total{journey="global"}
  alerting:
    disabled: true
    absent: false
