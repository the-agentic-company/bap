apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: app-coworker-run-success
  namespace: app
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: app
    pyrra.dev/journey: coworker_run
spec:
  target: "95"
  window: 30d
  description: Individual coworker run success rate.
  indicator:
    ratio:
      errors:
        metric: app_slo_events_total{journey="coworker_run",result="bad"}
      total:
        metric: app_slo_events_total{journey="coworker_run"}
  alerting:
    disabled: true
    absent: false
