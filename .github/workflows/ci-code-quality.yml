name: CI Code Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Render observability config
        run: bun scripts/check-render-observability-config.ts

      - name: Run workspace checks
        run: bun run check

      - name: Run CI tests
        run: bun run test:ci
