name: CI Code Quality

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "render.yaml"
      - "scripts/check-render-observability-config.ts"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.json"
      - ".github/workflows/ci-code-quality.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "render.yaml"
      - "scripts/check-render-observability-config.ts"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.json"
      - ".github/workflows/ci-code-quality.yml"
  workflow_dispatch:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Render observability config
        run: bun scripts/check-render-observability-config.ts

      - name: Run workspace checks
        run: bun run check

      - name: Run web formatting checks
        run: bun run --cwd apps/web format:check
