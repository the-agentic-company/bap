name: Deploy Render Services

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Git commit SHA to deploy"
        required: true
        type: string
      environment:
        description: "Environment to target"
        required: true
        type: string
    outputs:
      previous_web_deploy_id:
        description: "Previous successful web deploy ID"
        value: ${{ jobs.deploy.outputs.previous_web_deploy_id }}
      previous_worker_deploy_id:
        description: "Previous successful worker deploy ID"
        value: ${{ jobs.deploy.outputs.previous_worker_deploy_id }}
      previous_mcp_deploy_id:
        description: "Previous successful MCP deploy ID"
        value: ${{ jobs.deploy.outputs.previous_mcp_deploy_id }}
      web_deploy_id:
        description: "New web deploy ID"
        value: ${{ jobs.deploy.outputs.web_deploy_id }}
      worker_deploy_id:
        description: "New worker deploy ID"
        value: ${{ jobs.deploy.outputs.worker_deploy_id }}
      mcp_deploy_id:
        description: "New MCP deploy ID"
        value: ${{ jobs.deploy.outputs.mcp_deploy_id }}
    secrets:
      RENDER_API_KEY:
        required: false
      RENDER_WEB_SERVICE_ID:
        required: false
      RENDER_WORKER_SERVICE_ID:
        required: false
      RENDER_MCP_SERVICE_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
      RENDER_WORKER_SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
      RENDER_MCP_SERVICE_ID: ${{ secrets.RENDER_MCP_SERVICE_ID }}
    outputs:
      previous_web_deploy_id: ${{ steps.previous-web.outputs.deploy_id }}
      previous_worker_deploy_id: ${{ steps.previous-worker.outputs.deploy_id }}
      previous_mcp_deploy_id: ${{ steps.previous-mcp.outputs.deploy_id }}
      web_deploy_id: ${{ steps.deploy-web.outputs.deploy_id }}
      worker_deploy_id: ${{ steps.deploy-worker.outputs.deploy_id }}
      mcp_deploy_id: ${{ steps.deploy-mcp.outputs.deploy_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate Render configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [ -n "${RENDER_API_KEY}" ] || missing+=("RENDER_API_KEY")
          [ -n "${RENDER_WEB_SERVICE_ID}" ] || missing+=("RENDER_WEB_SERVICE_ID")
          [ -n "${RENDER_WORKER_SERVICE_ID}" ] || missing+=("RENDER_WORKER_SERVICE_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Render secret(s) for GitHub environment "%s": %s\n' \
              "${{ inputs.environment }}" "${missing[*]}" >&2
            printf 'Set these as secrets on the GitHub environment named "%s".\n' \
              "${{ inputs.environment }}" >&2
            exit 1
          fi

      - name: Capture previous web deploy
        id: previous-web
        run: bun scripts/release/render-deploy.ts previous-success --service-id "${RENDER_WEB_SERVICE_ID}"

      - name: Capture previous worker deploy
        id: previous-worker
        run: bun scripts/release/render-deploy.ts previous-success --service-id "${RENDER_WORKER_SERVICE_ID}"

      - name: Capture previous MCP deploy
        id: previous-mcp
        if: ${{ env.RENDER_MCP_SERVICE_ID != '' }}
        run: bun scripts/release/render-deploy.ts previous-success --service-id "${RENDER_MCP_SERVICE_ID}"

      - name: Deploy MCP
        id: deploy-mcp
        if: ${{ env.RENDER_MCP_SERVICE_ID != '' }}
        run: bun scripts/release/render-deploy.ts deploy --service-id "${RENDER_MCP_SERVICE_ID}" --commit "${{ inputs.commit_sha }}"

      - name: Deploy web
        id: deploy-web
        run: bun scripts/release/render-deploy.ts deploy --service-id "${RENDER_WEB_SERVICE_ID}" --commit "${{ inputs.commit_sha }}"

      - name: Deploy worker
        id: deploy-worker
        run: bun scripts/release/render-deploy.ts deploy --service-id "${RENDER_WORKER_SERVICE_ID}" --commit "${{ inputs.commit_sha }}"
