name: Push DB Schema

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        type: string
      environment:
        description: "Environment to target"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"
      environment:
        description: "Environment to target"
        required: true
        type: choice
        default: "staging"
        options:
          - "staging"
          - "prod"

jobs:
  db-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Push DB changes
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
          ENVIRONMENT: ${{ inputs.environment }}
          SKIP_ENV_VALIDATION: "1"
        shell: bash
        run: |
          set -euo pipefail

          case "${ENVIRONMENT}" in
            staging)
              export DATABASE_URL="${DATABASE_URL_STAGING}"
              ;;
            prod)
              export DATABASE_URL="${DATABASE_URL_PROD}"
              ;;
            *)
              echo "Unsupported environment: ${ENVIRONMENT}" >&2
              exit 1
              ;;
          esac

          if [ -z "${DATABASE_URL}" ]; then
            case "${ENVIRONMENT}" in
              staging)
                echo "Missing DATABASE_URL_STAGING secret" >&2
                ;;
              prod)
                echo "Missing DATABASE_URL_PROD secret" >&2
                ;;
            esac
            exit 1
          fi

          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT

          if bun run db:push 2>&1 | tee "$log_file"; then
            if grep -Eq "^error:" "$log_file"; then
              echo "db:push printed an error but exited successfully; failing CI." >&2
              exit 1
            fi
            exit 0
          fi

          if grep -Fq "Interactive prompts require a TTY terminal" "$log_file"; then
            prompt_context="$(grep -iE "you're about to|do you want to truncate|truncate the table|add unique|add constraint" "$log_file" || true)"
            echo >&2
            echo "db:push needs manual approval for a schema change and cannot continue in CI." >&2
            echo "Drizzle prompted for confirmation because the push may require a risky operation, such as truncating data or applying a constraint on existing rows." >&2
            if [ -n "$prompt_context" ]; then
              echo "Prompt context from Drizzle:" >&2
              echo "$prompt_context" >&2
            fi
            echo "Run the same db:push command manually in a TTY and decide how to handle the prompt." >&2
          fi

          exit 1
