name: Verify Deployment

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to verify"
        required: true
        type: string
      base_url:
        description: "Public base URL to verify"
        required: true
        type: string
      run_replay:
        description: "Run release replay fixtures"
        required: false
        type: boolean
        default: true
    secrets:
      APP_SERVER_SECRET:
        required: true
      APP_MCP_BASE_URL:
        required: true
      APP_DEFAULT_USER_EMAIL:
        required: false
      DATABASE_URL_PROD:
        required: false
      DATABASE_URL_STAGING:
        required: true
      RELEASE_REPLAY_FILE:
        required: false

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check health endpoint
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: curl --fail --show-error --silent "${BASE_URL}/api/health"

      - name: Resolve database URL
        env:
          DATABASE_URL_RAW: ${{ inputs.environment == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
        shell: bash
        run: |
          set -euo pipefail

          database_url="${DATABASE_URL_RAW}"
          if [[ "${database_url}" != *"uselibpqcompat=true"* ]]; then
            separator="?"
            if [[ "${database_url}" == *"?"* ]]; then
              separator="&"
            fi
            database_url="${database_url}${separator}uselibpqcompat=true"
          fi

          echo "DATABASE_URL=${database_url}" >> "$GITHUB_ENV"

      - name: Run CLI live checks
        env:
          APP_DEFAULT_USER_EMAIL: ${{ secrets.APP_DEFAULT_USER_EMAIL }}
          APP_MCP_BASE_URL: ${{ secrets.APP_MCP_BASE_URL }}
          APP_SERVER_SECRET: ${{ secrets.APP_SERVER_SECRET }}
          APP_SERVER_URL: ${{ inputs.base_url }}
          E2E_CLI_LIVE_TEST_FILES: "tests/e2e-cli/chat.interrupt.cli.live.test.ts"
          E2E_CLI_LIVE_TEST_NAME: "cancels in-flight generation and prints cancelled marker"
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: bun run --cwd apps/web test:e2e:cli:live

      - name: Run conversation and workflow replay
        if: ${{ inputs.run_replay }}
        env:
          APP_DEFAULT_USER_EMAIL: ${{ secrets.APP_DEFAULT_USER_EMAIL }}
          APP_SERVER_SECRET: ${{ secrets.APP_SERVER_SECRET }}
          APP_SERVER_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          RELEASE_REPLAY_FILE: ${{ secrets.RELEASE_REPLAY_FILE }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_REPLAY_FILE}" ]; then
            echo "RELEASE_REPLAY_FILE is not configured; skipping replay gate."
            exit 0
          fi

          bun run --cwd apps/web test:replay:release
