name: Verify Observability

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to verify"
        required: true
        type: string
      verify_grafana:
        description: "Verify Grafana health"
        required: false
        type: boolean
        default: false
      verify_vmalert:
        description: "Verify vmalert rules through VictoriaMetrics"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    if: ${{ inputs.verify_grafana || inputs.verify_vmalert }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve observability endpoints
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.environment }}" in
            staging | prod)
              echo "GRAFANA_URL=https://grafana.ops.${{ inputs.environment }}.cmdclaw.ai" >> "$GITHUB_ENV"
              echo "VICTORIA_METRICS_URL=https://victoria-metrics.ops.${{ inputs.environment }}.cmdclaw.ai" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported environment: ${{ inputs.environment }}" >&2
              exit 1
              ;;
          esac

      - name: Verify Grafana health
        if: ${{ inputs.verify_grafana }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 20); do
            if curl --fail --show-error --silent "${GRAFANA_URL}/api/health" \
              | jq -e '.database == "ok"' >/dev/null; then
              exit 0
            fi

            echo "Grafana health check failed on attempt ${attempt}; retrying..."
            sleep 15
          done

          echo "Grafana health check did not pass." >&2
          exit 1

      - name: Verify vmalert rules
        if: ${{ inputs.verify_vmalert }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 20); do
            rules="$(curl --fail --show-error --silent "${VICTORIA_METRICS_URL}/api/v1/rules")"

            if echo "${rules}" | jq -e --arg group "cmdclaw-${{ inputs.environment }}-runtime" '
              .status == "success"
              and any(.data.groups[]?; .name == $group)
            ' >/dev/null; then
              exit 0
            fi

            echo "vmalert rule check failed on attempt ${attempt}; retrying..."
            sleep 15
          done

          echo "vmalert runtime rules were not registered in VictoriaMetrics." >&2
          exit 1
