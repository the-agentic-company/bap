  rollback-staging-render:
    needs:
      - staging-render
      - staging-verify
    if: ${{ always() && needs.staging-render.result == 'success' && needs.staging-verify.result == 'failure' }}
    uses: ./.github/workflows/render-rollback.yml
    with:
      environment: staging
      web_deploy_id: ${{ needs.staging-render.outputs.previous_web_deploy_id }}
      worker_deploy_id: ${{ needs.staging-render.outputs.previous_worker_deploy_id }}
      mcp_deploy_id: ${{ needs.staging-render.outputs.previous_mcp_deploy_id }}
    secrets: inherit

  notify-failure:
    needs:
      - resolve
      - staging-db
      - staging-daytona
      - staging-render
      - staging-verify
      - rollback-staging-render
      # - prod-db
      # - prod-daytona
      # - prod-render
      # - prod-verify
      # - rollback-prod-render
      # - tag-release
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Report failure
        run: |
          echo "Release failed for commit ${{ needs.resolve.outputs.commit_sha }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Slack alert
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail

          payload="$(jq -n \
            --arg channel "#ops-alerts" \
            --arg text "CmdClaw release failed for ${{ needs.resolve.outputs.commit_sha }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{channel: $channel, text: $text}')"

          response="$(curl --fail --show-error --silent \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${payload}" \
            https://slack.com/api/chat.postMessage)"

          echo "${response}" | jq -e '.ok == true' >/dev/null
