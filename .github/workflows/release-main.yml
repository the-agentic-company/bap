name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to release"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve commit on main
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --force
          commit_sha="$(git rev-parse HEAD^{commit})"
          git merge-base --is-ancestor "${commit_sha}" origin/main
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  staging-db:
    needs: resolve
    uses: ./.github/workflows/db-push.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-daytona:
    needs: resolve
    uses: ./.github/workflows/daytona-sandbox.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-render:
    needs:
      - resolve
      - staging-db
      - staging-daytona
    uses: ./.github/workflows/render-deploy.yml
    with:
      commit_sha: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-verify:
    needs: staging-render
    uses: ./.github/workflows/verify-deployment.yml
    with:
      environment: staging
      base_url: https://staging.cmdclaw.ai
      run_replay: true
    secrets: inherit

