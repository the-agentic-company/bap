name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to release"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      changed_since: ${{ steps.resolve.outputs.changed_since }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve release commit
        id: resolve
        env:
          BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --force
          commit_sha="$(git rev-parse "HEAD^{commit}")"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if git merge-base --is-ancestor "${commit_sha}" origin/main; then
              changed_since="$(git rev-parse "${commit_sha}^")"
            else
              changed_since="$(git merge-base "${commit_sha}" origin/main)"
            fi
          else
            git merge-base --is-ancestor "${commit_sha}" origin/main
            changed_since="${BEFORE}"
            if [ -z "${changed_since}" ] || [[ "${changed_since}" =~ ^0+$ ]]; then
              changed_since="$(git rev-parse "${commit_sha}^")"
            fi
          fi

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "changed_since=${changed_since}" >> "$GITHUB_OUTPUT"

  observability-changes:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.changes.outputs.any }}
      grafana: ${{ steps.changes.outputs.grafana }}
      victoria_metrics: ${{ steps.changes.outputs.victoria_metrics }}
      vmalert: ${{ steps.changes.outputs.vmalert }}
      alertmanager: ${{ steps.changes.outputs.alertmanager }}
      vector: ${{ steps.changes.outputs.vector }}
      caddy: ${{ steps.changes.outputs.caddy }}
      verify_grafana: ${{ steps.changes.outputs.verify_grafana }}
      verify_vmalert: ${{ steps.changes.outputs.verify_vmalert }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.commit_sha }}
          fetch-depth: 0

      - name: Detect observability changes
        id: changes
        env:
          CHANGED_SINCE: ${{ needs.resolve.outputs.changed_since }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD: ${{ needs.resolve.outputs.commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            grafana=true
            victoria_metrics=true
            vmalert=true
            alertmanager=true
            vector=true
            caddy=true
          else
            before="${CHANGED_SINCE}"
            head="${HEAD}"

            if [ -z "${before}" ] || [[ "${before}" =~ ^0+$ ]]; then
              before="$(git rev-parse "${head}^")"
            fi

            git diff --name-only "${before}" "${head}" > /tmp/release-main-files.txt

            changed() {
              grep -Eq "$1" /tmp/release-main-files.txt
            }

            blueprint=false
            changed '^render\.yaml$' && blueprint=true

            grafana=false
            victoria_metrics=false
            vmalert=false
            alertmanager=false
            vector=false
            caddy=false

            if [ "${blueprint}" = true ]; then
              grafana=true
              victoria_metrics=true
              vmalert=true
              alertmanager=true
              vector=true
              caddy=true
            fi

            changed '^docker/images/grafana/' && grafana=true
            changed '^docker/images/vmalert/' && vmalert=true
            changed '^docker/images/alertmanager/' && alertmanager=true
            changed '^docker/images/vector/' && vector=true
            changed '^docker/images/caddy/' && caddy=true
          fi

          any=false
          if [ "${grafana}" = true ] || [ "${victoria_metrics}" = true ] || [ "${vmalert}" = true ] || [ "${alertmanager}" = true ] || [ "${vector}" = true ] || [ "${caddy}" = true ]; then
            any=true
          fi

          verify_grafana=false
          verify_vmalert=false
          if [ "${grafana}" = true ] || [ "${caddy}" = true ]; then
            verify_grafana=true
          fi
          if [ "${vmalert}" = true ] || [ "${caddy}" = true ]; then
            verify_vmalert=true
          fi

          {
            echo "any=${any}"
            echo "grafana=${grafana}"
            echo "victoria_metrics=${victoria_metrics}"
            echo "vmalert=${vmalert}"
            echo "alertmanager=${alertmanager}"
            echo "vector=${vector}"
            echo "caddy=${caddy}"
            echo "verify_grafana=${verify_grafana}"
            echo "verify_vmalert=${verify_vmalert}"
          } >> "$GITHUB_OUTPUT"

  checks:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.commit_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          format: compact
          fail-on-issues: true
          version: 2.88.3
          changed-since: ${{ needs.resolve.outputs.changed_since }}

      - name: Check Render observability config
        run: bun scripts/check-render-observability-config.ts

      - name: Run workspace checks
        run: bun run check

      - name: Check file size limit
        run: bun run lint:size

      - name: Run CI tests
        run: bun run test:ci

  staging-resume:
    needs:
      - resolve
      - checks
    runs-on: ubuntu-latest
    environment: staging
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.commit_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resume staging Render resources
        run: bun scripts/release/render-staging-lifecycle.ts resume

  staging-db:
    needs:
      - resolve
      - checks
      - staging-resume
    uses: ./.github/workflows/db-push.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-daytona:
    needs:
      - resolve
      - checks
      - staging-resume
    uses: ./.github/workflows/daytona-sandbox.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-render:
    needs:
      - resolve
      - staging-resume
      - staging-db
    uses: ./.github/workflows/render-deploy.yml
    with:
      commit_sha: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-observability:
    needs:
      - resolve
      - checks
      - staging-resume
      # Temporarily bypass observability change detection while the stack is
      # being iterated on heavily. Keep deploying every main release until this
      # gate is restored.
      # - observability-changes
    # if: ${{ needs.observability-changes.outputs.any == 'true' }}
    uses: ./.github/workflows/render-observability-deploy.yml
    with:
      commit_sha: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
      deploy_grafana: true
      deploy_victoria_metrics: true
      deploy_vmalert: true
      deploy_alertmanager: true
      deploy_vector: true
      deploy_caddy: true
      # deploy_grafana: ${{ needs.observability-changes.outputs.grafana == 'true' }}
      # deploy_victoria_metrics: ${{ needs.observability-changes.outputs.victoria_metrics == 'true' }}
      # deploy_vmalert: ${{ needs.observability-changes.outputs.vmalert == 'true' }}
      # deploy_alertmanager: ${{ needs.observability-changes.outputs.alertmanager == 'true' }}
      # deploy_vector: ${{ needs.observability-changes.outputs.vector == 'true' }}
      # deploy_caddy: ${{ needs.observability-changes.outputs.caddy == 'true' }}
    secrets: inherit

  staging-observability-verify:
    needs:
      - staging-observability
    # if: ${{ needs.observability-changes.outputs.verify_grafana == 'true' || needs.observability-changes.outputs.verify_vmalert == 'true' }}
    uses: ./.github/workflows/verify-observability.yml
    with:
      environment: staging
      verify_grafana: true
      verify_vmalert: true
      # verify_grafana: ${{ needs.observability-changes.outputs.verify_grafana == 'true' }}
      # verify_vmalert: ${{ needs.observability-changes.outputs.verify_vmalert == 'true' }}
    secrets: inherit

  staging-verify:
    needs:
      - staging-db
      - staging-daytona
      - staging-render
    uses: ./.github/workflows/verify-deployment.yml
    with:
      environment: staging
      base_url: https://staging.heybap.com
      run_replay: true
    secrets: inherit

