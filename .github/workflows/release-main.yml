      # - prod-verify
      # - rollback-prod-render
      # - tag-release
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Report failure
        env:
          COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          echo "Release failed for commit ${COMMIT_SHA}"
          echo "Run: ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

      - name: Send Slack alert
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        env:
          COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          set -euo pipefail

          payload="$(jq -n \
            --arg channel "#ops-alerts" \
            --arg text "CmdClaw release failed for ${COMMIT_SHA}: ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}" \
            '{channel: $channel, text: $text}')"

          response="$(curl --fail --show-error --silent \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${payload}" \
            https://slack.com/api/chat.postMessage)"

          echo "${response}" | jq -e '.ok == true' >/dev/null
