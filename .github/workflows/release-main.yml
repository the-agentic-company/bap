  notify-failure:
    needs:
      - resolve
      - observability-changes
      - checks
      - staging-db
      - staging-daytona
      - staging-render
      - staging-observability
      - staging-observability-verify
      - staging-verify
      # - rollback-staging-render
      # - prod-db
      # - prod-daytona
