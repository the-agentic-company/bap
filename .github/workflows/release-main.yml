name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to release"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve commit on main
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --force
          commit_sha="$(git rev-parse HEAD^{commit})"
          git merge-base --is-ancestor "${commit_sha}" origin/main
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  staging-db:
    needs: resolve
    uses: ./.github/workflows/db-push.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-daytona:
    needs: resolve
    uses: ./.github/workflows/daytona-sandbox.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-render:
    needs:
      - resolve
      - staging-db
      - staging-daytona
    uses: ./.github/workflows/render-deploy.yml
    with:
      commit_sha: ${{ needs.resolve.outputs.commit_sha }}
      environment: staging
    secrets: inherit

  staging-verify:
    needs: staging-render
    uses: ./.github/workflows/verify-deployment.yml
    with:
      environment: staging
      base_url: https://staging.cmdclaw.ai
      run_replay: true
    secrets: inherit

  rollback-staging-render:
    needs:
      - staging-render
      - staging-verify
    if: ${{ always() && needs.staging-render.result == 'success' && needs.staging-verify.result == 'failure' }}
    uses: ./.github/workflows/render-rollback.yml
    with:
      environment: staging
      web_deploy_id: ${{ needs.staging-render.outputs.previous_web_deploy_id }}
      worker_deploy_id: ${{ needs.staging-render.outputs.previous_worker_deploy_id }}
      mcp_deploy_id: ${{ needs.staging-render.outputs.previous_mcp_deploy_id }}
    secrets: inherit

  notify-failure:
    needs:
      - resolve
      - staging-db
      - staging-daytona
      - staging-render
      - staging-verify
      - rollback-staging-render
    if: ${{ always() && failure() }}
    runs-on: ubuntu-latest
    env:
      RELEASE_ALERT_WEBHOOK_URL: ${{ secrets.RELEASE_ALERT_WEBHOOK_URL }}
    steps:
      - name: Report failure
        run: |
          echo "Release failed for commit ${{ needs.resolve.outputs.commit_sha }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send alert webhook
        if: ${{ env.RELEASE_ALERT_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail

          payload="$(jq -n \
            --arg text "CmdClaw release failed for ${{ needs.resolve.outputs.commit_sha }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text: $text}')"
          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${RELEASE_ALERT_WEBHOOK_URL}"
