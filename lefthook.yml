pre-commit:
  commands:
    secrets:
      run: gitleaks protect --staged --config .gitleaks.toml --redact
    lint:
      glob: "apps/web/**/*.{ts,tsx,js,jsx}"
      run: bunx --bun oxlint --config apps/web/.oxlintrc.json --tsconfig apps/web/tsconfig.json {staged_files}
    lint-size:
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx --bun oxlint --config .oxlintrc.json {staged_files}
    typecheck:
      run: bun run check:web && bun run check:worker
    format:
      glob: "apps/web/**/*.{ts,tsx,js,jsx,mdx}"
      run: bunx --bun oxfmt --write {staged_files}
      stage_fixed: true


pre-push:
  parallel: false
  commands:
    fallow:
      run: bunx --bun fallow@2.88.3 audit --format compact --fail-on-issues --changed-since origin/main
    check:
      run: bun run check
    test:
      run: bun run test
    build:
      run: bun run build
      
